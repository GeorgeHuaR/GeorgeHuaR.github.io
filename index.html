<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> GeorgeHua 主页 V4.0</title>
    <!-- 预加载所有主题所需字体 -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700;900&family=Source+Sans+Pro:wght@400;600&family=Quicksand:wght@400;600;700&family=Nunito:wght@300;400;600&family=Audiowide&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
 
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="themes.css">

    
</head>
<body class="theme-illustration">
    <!-- V6.4.1：在首屏主体内容解析前同步恢复保存主题，避免先渲染默认玻璃主题再切换造成闪烁。 -->
    <script>
        (() => {
            // V6.4.1：早期启动脚本只处理 body class，正式主题状态仍由 main.js 在应用初始化阶段维护。
            const themeClasses = ['theme-glass', 'theme-illustration', 'theme-light-modern', 'theme-dark-modern', 'theme-tech'];

            try {
                const storedTheme = localStorage.getItem('navTheme');

                // V6.4.1：仅允许白名单主题覆盖默认 class，避免异常 localStorage 值污染页面根样式。
                if (themeClasses.includes(storedTheme)) {
                    document.body.classList.remove(...themeClasses);
                    document.body.classList.add(storedTheme);
                }
            } catch (error) {
                // V6.4.1：localStorage 不可用时保留 HTML 默认主题，避免早期主题脚本阻断首屏渲染。
            }
        })();
    </script>
    <!-- 左侧导航栏 -->
    <aside class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="menu-toggle" id="menuToggle">☰</button>
            <span class="signature">GeorgeHua</span>
        </div>
        <div class="nav-buttons" id="dynamic-nav-container">
            <!-- V3.6 改为了动态加载，根据 PageConfig.js 中的配置生成 -->

            <!-- <button class="nav-btn active" data-page="home"><span>🏠</span> <span>主页</span></button>
            <button class="nav-btn" data-page="about"><span>👤</span> <span>个人介绍</span></button>
            <button class="nav-btn" data-page="changelog"><span>📋</span> <span>版本更新</span></button>
            <button class="nav-btn" data-page="settings"><span>⚙️</span> <span>设置</span></button> -->
            <!-- <button class="nav-btn" data-page="tools"><span>🚩</span> <span>工具集</span></button> -->
            
        </div>
        <div class="sidebar-footer">
            <!-- <div class="avatar" style="background-image: url('Assets/images/avatar.png');"></div> -->
            <img class="avatar"
                src="Assets/images/p240.png"  
                srcset="
                    Assets/images/p160.png 2x,
                    Assets/images/p240.png 3x,
                    Assets/images/p320.png 4x"
                alt="GeorgeHua">
            <!-- <a href="#" class="profile-link">📋 个人资料</a> -->
            <a href="#" class="profile-link">🔧 其他</a>
        </div>
    </aside>

    <!-- 右侧动态内容区 -->
    <main class="main-content" id="content-area"></main>

    <!-- 引入 JS 文件，注意顺序：
         1. data.js - 定义基础数据
         2. PageConfig.js - 定义导航和页面路由配置
         3. main.js - 核心模块（定义 CoreModules）
         4. 页面模块 - 依赖 CoreModules，并需要与 PageConfig.js 中的 moduleName 保持一致
    -->
    <script src="data.js"></script>
    <script src="PageConfig.js"></script>
    
    <!-- 核心功能（必须先于页面模块加载） -->
    <script src="main.js"></script>
    <!-- V6.1.2：当前暂不启用懒加载；新增 module 页面时，需要在 PageConfig.js 注册并在此处同步引入脚本。 -->
    <script src="Pages/homePage.js"></script>
    <script src="Pages/aboutPage.js"></script>
    <script src="Pages/changelogPage.js"></script>
    <script src="Pages/settingsPage.js"></script>
    <!-- <script src="Pages/toolsPage.js"></script> -->
</body>
</html>
